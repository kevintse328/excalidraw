version: 2.1
workflows:
  cache-benchmark:
    jobs:
      - benchmark-no-cache
      - benchmark-warm-cache
      - benchmark-cold-miss
      - benchmark-perfect-cache
      - benchmark-restore-breakdown
      - benchmark-compression-comparison

jobs:
  benchmark-no-cache:
    docker:
      - image: cimg/node:22.0
    resource_class: medium
    steps:
      - checkout
      - run:
          name: Install dependencies (no cache)
          command: yarn install --frozen-lockfile --ignore-scripts --no-prefer-offline

  benchmark-warm-cache:
    docker:
      - image: cimg/node:22.0
    resource_class: medium
    steps:
      - checkout
      - restore_cache:
          keys:
            - excalidraw-deps-v1-{{ checksum "yarn.lock" }}
      - run:
          name: Install dependencies
          command: yarn install --frozen-lockfile --ignore-scripts
      - run:
          name: Count cache files
          command: find ~/.cache/yarn -type f | wc -l
      - run:
          name: Measure cache size
          command: du -sh ~/.cache/yarn
      - save_cache:
          key: excalidraw-deps-v1-{{ checksum "yarn.lock" }}
          paths:
            - ~/.cache/yarn

  benchmark-cold-miss:
    docker:
      - image: cimg/node:22.0
    resource_class: medium
    steps:
      - checkout
      - restore_cache:
          keys:
            # Intentionally wrong key — will always miss, measures failed restore overhead
            - excalidraw-deps-v1-cache-miss-{{ epoch }}
      - run:
          name: Install dependencies (after cache miss)
          command: yarn install --frozen-lockfile --ignore-scripts --no-prefer-offline

  benchmark-perfect-cache:
    docker:
      - image: cimg/node:22.0
    resource_class: medium
    steps:
      - checkout
      - run:
          name: Warm yarn cache (run 1 — not measured)
          command: yarn install --frozen-lockfile --ignore-scripts
      - run:
          name: Clear node_modules but keep yarn cache
          command: rm -rf node_modules
      - run:
          name: Install from perfect local cache (run 2 — this is the measurement)
          command: yarn install --frozen-lockfile --ignore-scripts

  benchmark-restore-breakdown:
    docker:
      - image: cimg/node:22.0
    resource_class: medium
    steps:
      - checkout
      - restore_cache:
          keys:
            - excalidraw-deps-v1-{{ checksum "yarn.lock" }}
      - run:
          name: Re-tar the cache (simulates save — no network)
          command: tar cf /tmp/yarn-cache.tar ~/.cache/yarn
      - run:
          name: Remove cache dir
          command: rm -rf ~/.cache/yarn
      - run:
          name: Extract from local tar (simulates restore — no network)
          command: time tar xf /tmp/yarn-cache.tar -C /

  benchmark-compression-comparison:
    docker:
      - image: cimg/node:22.0
    resource_class: medium
    steps:
      - checkout
      - restore_cache:
          keys:
            - excalidraw-deps-v1-{{ checksum "yarn.lock" }}

      - run:
          name: Install zstd
          command: sudo apt-get update -qq && sudo apt-get install -y -qq zstd

      - run:
          name: Characterise cache and detect format of restored artifact
          command: |
            echo "=== File count ==="
            find ~/.cache/yarn -type f | wc -l
            echo "=== Uncompressed size ==="
            du -sh ~/.cache/yarn
            echo "=== Detecting format of artifact downloaded by restore_cache ==="
            # The task-agent writes the downloaded archive to /tmp/cache* before extracting.
            # By the time this step runs it has already been cleaned up, but we can check
            # for any residual files and detect the format of what was saved.
            ls -lh /tmp/cache* 2>/dev/null || echo "No /tmp/cache* files (already cleaned up by task-agent — expected)"
            echo "=== Checking if zstd binary used by task-agent is present ==="
            find /usr/local/lib /usr/lib -name "libzstd*" 2>/dev/null | head -5 || echo "No libzstd found in standard paths"

      - run:
          name: Create all three tarballs from the same source
          command: |
            echo "--- Creating uncompressed tar ---"
            time tar cf /tmp/yarn-cache.tar ~/.cache/yarn
            echo "--- Creating gzip-compressed tar ---"
            time tar czf /tmp/yarn-cache.tar.gz ~/.cache/yarn
            echo "--- Creating zstd-compressed tar ---"
            time tar -I zstd -cf /tmp/yarn-cache.tar.zst ~/.cache/yarn
            echo "=== Tarball sizes ==="
            ls -lh /tmp/yarn-cache.tar /tmp/yarn-cache.tar.gz /tmp/yarn-cache.tar.zst
            echo "=== Compression ratios ==="
            python3 -c "
            import os
            unc = os.path.getsize('/tmp/yarn-cache.tar')
            gz  = os.path.getsize('/tmp/yarn-cache.tar.gz')
            zst = os.path.getsize('/tmp/yarn-cache.tar.zst')
            print(f'Uncompressed: {unc/1024/1024:.1f} MB')
            print(f'Gzip:         {gz/1024/1024:.1f} MB  ratio {unc/gz:.2f}x')
            print(f'Zstd:         {zst/1024/1024:.1f} MB  ratio {unc/zst:.2f}x')
            "

      # ── Round 1: uncompressed → gzip → zstd ──────────────────────────────────
      - run:
          name: "[R1-unc] Uncompressed"
          command: |
            rm -rf ~/.cache/yarn && sync
            time tar xf /tmp/yarn-cache.tar -C /

      - run:
          name: "[R1-gz] Gzip"
          command: |
            rm -rf ~/.cache/yarn && sync
            time tar xzf /tmp/yarn-cache.tar.gz -C /

      - run:
          name: "[R1-zst] Zstd"
          command: |
            rm -rf ~/.cache/yarn && sync
            time tar -I zstd -xf /tmp/yarn-cache.tar.zst -C /

      # ── Round 2 (reverse order): zstd → gzip → uncompressed ─────────────────
      - run:
          name: "[R2-zst] Zstd (reverse)"
          command: |
            rm -rf ~/.cache/yarn && sync
            time tar -I zstd -xf /tmp/yarn-cache.tar.zst -C /

      - run:
          name: "[R2-gz] Gzip (reverse)"
          command: |
            rm -rf ~/.cache/yarn && sync
            time tar xzf /tmp/yarn-cache.tar.gz -C /

      - run:
          name: "[R2-unc] Uncompressed (reverse)"
          command: |
            rm -rf ~/.cache/yarn && sync
            time tar xf /tmp/yarn-cache.tar -C /

      - run:
          name: Summary — compare to platform restore_cache times
          command: |
            echo "Read the 'real' times from the six steps above."
            echo ""
            echo "Expected order (fastest to slowest): uncompressed < zstd < gzip"
            echo "Platform restore_cache reported: download 5.96s + extraction 17.53s = 23.49s total"
            echo ""
            echo "If gzip local time ≈ 17.53s  → platform is still extracting gzip despite 'Extracting using zstd' log"
            echo "If zstd local time ≈ 17.53s  → platform zstd is correct but slower than our single-node zstd (expected)"
            echo "If uncompressed ≈ 17.53s     → extraction overhead is pure filesystem IO regardless of compression"